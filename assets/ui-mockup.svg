<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gallery interface mockup">
  <defs>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24405f"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1018"/>
      <stop offset="1" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="topfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="screen"><rect x="0" y="0" width="900" height="540" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#screen)">
    <!-- blurred backdrop fill -->
    <rect width="900" height="540" fill="url(#back)"/>
    <circle cx="450" cy="270" r="320" fill="#24405f" opacity="0.25"/>

    <!-- contained photo -->
    <g>
      <rect x="250" y="90" width="400" height="360" rx="6" fill="url(#photo)"/>
      <circle cx="335" cy="170" r="34" fill="#e8d27a" opacity="0.9"/>
      <path d="M250 450 L370 300 L450 370 L540 250 L650 450 Z" fill="#0e1622" opacity="0.92"/>
      <path d="M250 450 L360 350 L470 410 L580 320 L650 450 Z" fill="#0a121c"/>
    </g>

    <!-- top bar -->
    <rect x="0" y="0" width="900" height="64" fill="url(#topfade)"/>
    <text x="24" y="39" font-family="ui-monospace, monospace" font-size="15" fill="#e6e6e6" letter-spacing="1">7 / 42</text>

    <!-- top-right controls -->
    <g font-family="system-ui, sans-serif" font-size="13" fill="#e6e6e6">
      <text x="430" y="39" font-size="20" fill="#ff5a7a">&#9829;</text>
      <g>
        <rect x="470" y="20" width="92" height="28" rx="6" fill="#1f3052" opacity="0.85"/>
        <text x="484" y="39" fill="#cfe0ff">Next page &#8629;</text>
      </g>
      <g>
        <rect x="574" y="20" width="104" height="28" rx="6" fill="#ffffff" opacity="0.10"/>
        <text x="588" y="39">Open image &#8599;</text>
      </g>
      <g>
        <rect x="690" y="20" width="40" height="28" rx="6" fill="#ffffff" opacity="0.10"/>
        <text x="703" y="40" font-size="16">&#9210;</text>
      </g>
      <g>
        <rect x="742" y="20" width="40" height="28" rx="6" fill="#ffffff" opacity="0.10"/>
        <text x="757" y="39" font-size="15">&#10005;</text>
      </g>
    </g>

    <!-- nav arrows -->
    <text x="40" y="285" font-family="system-ui, sans-serif" font-size="60" fill="#ffffff" opacity="0.5">&#8249;</text>
    <text x="828" y="285" font-family="system-ui, sans-serif" font-size="60" fill="#ffffff" opacity="0.5">&#8250;</text>

    <!-- like flash -->
    <text x="430" y="300" font-family="system-ui, sans-serif" font-size="120" fill="#ff5a7a" opacity="0.85">&#9829;</text>

    <!-- caption strip -->
    <g font-family="system-ui, sans-serif">
      <text x="450" y="500" text-anchor="middle" font-size="14" fill="#8a93a3">
        Space like &#183; &#8593; like + next page &#183; Enter seamless next page &#183; ⌥X saved gallery
      </text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="899" height="539" rx="16" fill="none" stroke="#2a3142" stroke-width="1"/>
</svg>
