<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fullscreen Gallery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131a"/>
      <stop offset="0.55" stop-color="#161a24"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4c8dff"/>
      <stop offset="1" stop-color="#a86bff"/>
    </linearGradient>
    <linearGradient id="thumb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a55"/><stop offset="1" stop-color="#1a2233"/>
    </linearGradient>
    <linearGradient id="thumb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#553a4e"/><stop offset="1" stop-color="#2a1f2b"/>
    </linearGradient>
    <linearGradient id="thumb3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5547"/><stop offset="1" stop-color="#1f2a24"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="frame"><rect x="55" y="30" width="320" height="210" rx="14"/></clipPath>
  </defs>

  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>

  <!-- ambient orbs -->
  <circle cx="980" cy="70" r="150" fill="#4c8dff" opacity="0.10" filter="url(#soft)"/>
  <circle cx="1120" cy="300" r="120" fill="#a86bff" opacity="0.10" filter="url(#soft)"/>

  <!-- left: wordmark -->
  <g transform="translate(72,118)">
    <!-- expand glyph -->
    <g stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M2 22 L2 2 L22 2"/>
      <path d="M52 2 L72 2 L72 22"/>
      <path d="M72 70 L72 90 L52 90"/>
      <path d="M22 90 L2 90 L2 70"/>
    </g>
    <text x="98" y="34" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="800" fill="#f3f5fa">Fullscreen</text>
    <text x="98" y="84" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="800" fill="url(#accent)">Gallery</text>
    <text x="100" y="126" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" fill="#8a93a3">Turn any website into an edge-to-edge image gallery.</text>
    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#cfe0ff">
      <rect x="100" y="150" width="150" height="30" rx="7" fill="#1c2230" stroke="#2f3a52"/>
      <text x="116" y="170">⌥Z  open · fullscreen</text>
    </g>
  </g>

  <!-- right: stacked photo frames -->
  <g transform="translate(720,70)">
    <rect x="40" y="40" width="300" height="200" rx="14" fill="url(#thumb3)" transform="rotate(-7 190 140)"/>
    <rect x="70" y="20" width="300" height="200" rx="14" fill="url(#thumb2)" transform="rotate(5 220 120)"/>
    <rect x="55" y="30" width="320" height="210" rx="14" fill="url(#thumb1)" stroke="#46557a" stroke-width="1.5"/>
    <!-- mountain motif -->
    <g clip-path="url(#frame)">
      <circle cx="120" cy="90" r="20" fill="#e8d27a" opacity="0.85"/>
      <path d="M55 240 L150 140 L210 195 L270 120 L375 240 Z" fill="#1a2233" opacity="0.9"/>
      <path d="M55 240 L150 175 L230 215 L300 165 L375 240 Z" fill="#0f1622" opacity="0.95"/>
    </g>
    <!-- heart badge -->
    <g transform="translate(330,46)">
      <circle r="20" fill="#16181d" stroke="#3a4151"/>
      <path d="M0 7 C -10 -4 -16 4 0 14 C 16 4 10 -4 0 7 Z" fill="#ff5a7a"/>
    </g>
  </g>
</svg>
